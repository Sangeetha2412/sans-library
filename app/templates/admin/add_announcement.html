{% extends 'base.html' %}
{% block title %}Add Announcement — Sans Library Admin{% endblock %}
{% block content %}
<div style="display:flex;min-height:100vh;background:#090014">
    <div class="admin-sidebar">
        <div class="admin-logo"><i class="bi bi-speedometer2 me-2"></i>Dashboard</div>
        <nav class="nav flex-column">
            <a class="nav-link" href="{{ url_for('admin.dashboard') }}"><i class="bi bi-house"></i>Dashboard</a>
            <a class="nav-link" href="{{ url_for('admin.books') }}"><i class="bi bi-book"></i>Books</a>
            <a class="nav-link active" href="{{ url_for('admin.announcements') }}"><i class="bi bi-megaphone"></i>Announcements</a>
            <a class="nav-link" href="{{ url_for('admin.messages') }}"><i class="bi bi-envelope"></i>Messages</a>
            <a class="nav-link" href="{{ url_for('admin.subscribers') }}"><i class="bi bi-bell"></i>Subscribers</a>
            <a class="nav-link" href="{{ url_for('admin.settings') }}"><i class="bi bi-gear"></i>Settings</a>
            <hr class="border-secondary my-2">
            <a class="nav-link" href="{{ url_for('admin.logout') }}"><i class="bi bi-box-arrow-right"></i>Logout</a>
        </nav>
    </div>
    <div class="admin-content">
        <h2 class="text-white fw-bold mb-4">New Announcement</h2>
        <form method="POST" class="glass-card p-5" style="max-width:700px">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3"><label class="form-label text-white">Title</label><input type="text" name="title" class="form-control glass-input" required></div>
            <div class="mb-3"><label class="form-label text-white">Category</label><input type="text" name="category" class="form-control glass-input" value="General"></div>
            <div class="mb-3"><label class="form-label text-white">Description</label><textarea name="description" class="form-control glass-input" rows="4" required></textarea></div>
            <div class="mb-3"><label class="form-label text-white">Banner Image URL</label><input type="url" name="banner_image" class="form-control glass-input"></div>
            <div class="d-flex gap-2"><button type="submit" class="btn btn-glow">Create</button><a href="{{ url_for('admin.announcements') }}" class="btn btn-outline-light">Cancel</a></div>
        </form>
    </div>
</div>
{% endblock %}
